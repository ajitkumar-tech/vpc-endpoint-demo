

on: 
  push:      
    branches:   
      - main       
      
env:                          
  Region: us-east-1 
  name: nginx
  clustername: my-eks-cluster
jobs: 
  job1:   
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4   

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4  
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:  ${{ env.Region }}

      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.0 

      - name: init
        run: terraform init
 
      - name: plan
        run: terraform plan 
       
      - name: terraform
        run: terraform destroy -auto-approve 

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: repo check
        run: aws ecr create-repository --repository-name ${{ env.name }}  --region ${{ env.Region }}
        continue-on-error: true

        

      - name: build
        run:  docker build -t ${{ env.name }} .

      - name: tag
        run: docker tag nginx:latest 748716953870.dkr.ecr.${{ env.Region }}.amazonaws.com/${{ env.name }}:latest
           
      - name: push    
        run:  docker push 748716953870.dkr.ecr.${{ env.Region }}.amazonaws.com/${{ env.name }}:latest

      - name: update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.clustername }}    --region ${{ env.Region }} 

      

      - name: deploy 
        run: kubectl app -f deployment.yaml

      - name: pod
        run: kubectl get pods

      

        
    



      
      

      
      
      
      
